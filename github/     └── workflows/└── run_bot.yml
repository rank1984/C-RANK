name: DAY-S-BOT

on:
  schedule:
    - cron: '20 14 * * 1-5'   # 9:20 NY  = סריקת בוקר
    - cron: '45-59 13 * * 1-5' # 9:45 NY  = ציד (כל דקה)
    - cron: '0-15 14 * * 1-5'  # 10:00 NY = ציד (המשך)
    - cron: '16-30 14 * * 1-5' # 10:16 NY = Follow-Up
    - cron: '30 21 * * 1-5'    # 16:30 NY = הכנה + CSV
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install
        run: pip install yfinance pandas requests pytz

      - name: Get date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore state
        uses: actions/cache@v3
        with:
          path: |
            signals_*.csv
            state_*.json
          key: bot-${{ steps.date.outputs.date }}
          restore-keys: bot-

      - name: Run
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python day_s_bot_FINAL.py

      - name: Save CSV artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: signals-${{ steps.date.outputs.date }}
          path: signals_*.csv
          retention-days: 30
