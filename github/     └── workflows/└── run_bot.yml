name: Run C-RANK Elite Bot

on:
  schedule:
    - cron: '45 13 * * 1-5' # 16:45 שעון ישראל (13:45 UTC)
  workflow_dispatch: # מאפשר הרצה ידנית

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests pandas

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_bot.py

      - name: Commit and push journal
        run: |
          git config --global user.name "C-RANK Bot"
          git config --global user.email "bot@c-rank.com"
          git add trade_journal.csv || echo "No changes"
          git commit -m "Update Journal [skip ci]" || echo "No changes"
          git push || echo "Push failed"
