name: DAY-S-BOT

on:
  schedule:
    # 16:45 ישראל = 13:45 UTC
    - cron: '45 13 * * 1-5'
    # 21:30 ישראל = 18:30 UTC
    - cron: '30 18 * * 1-5'
  workflow_dispatch:

env:
  # מבטל את אזהרת ה-Node.js 20 ומעביר ל-Node 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install yfinance pandas requests pytz

      - name: Get Date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore Cache
        uses: actions/cache@v4
        with:
          path: |
            signals_*.csv
            state_*.json
          key: bot-${{ steps.date.outputs.date }}-${{ github.run_number }}
          restore-keys: bot-${{ steps.date.outputs.date }}-

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # כאן התיקון הקריטי - השם תואם לקובץ ב-Repo שלך:
        run: python daily_bot.py

      - name: Save Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signals-${{ steps.date.outputs.date }}-${{ github.run_number }}
          path: signals_*.csv
          retention-days: 30
          if-no-files-found: ignore
