name: DAY-S-BOT

on:
  schedule:
    # ישראל קיץ = UTC+3
    # NY חורף = UTC-5 (עד מרץ), NY קיץ = UTC-4 (מאפריל)
    #
    # 16:45 ישראל קיץ = 13:45 UTC
    # (NY עדיין פותח 9:30 NY = 14:30 UTC בחורף, 13:30 UTC בקיץ)
    - cron: '45 13 * * 1-5'

    # 21:30 ישראל קיץ = 18:30 UTC
    - cron: '30 18 * * 1-5'

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: התקנה
        run: pip install yfinance pandas requests pytz

      - name: תאריך
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: שחזור state
        uses: actions/cache@v3
        with:
          path: |
            signals_*.csv
            state_*.json
          key: bot-${{ steps.date.outputs.date }}-${{ github.run_number }}
          restore-keys: bot-${{ steps.date.outputs.date }}-

      - name: הרצה
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python day_s_bot_FINAL.py

      - name: שמירת CSV
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: signals-${{ steps.date.outputs.date }}
          path: signals_*.csv
          retention-days: 30
          if-no-files-found: ignore
