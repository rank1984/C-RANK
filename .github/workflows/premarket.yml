name: 1 - Premarket Scanner

on:
  schedule:
    - cron: '30 12 * * 1-5' # 15:30 IL time (08:30 NY time)
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas requests pytz
      - name: Run Premarket Scanner
        run: python premarket_scanner.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Commit Watchlist
        run: |
          git config user.name "DAY-S-BOT"
          git config user.email "bot@days-bot.com"
          git add daily_watchlist.csv || true
          git commit -m "📋 Daily Watchlist Update" || true
          git push || true
