name: Premarket Scanner

on:
  schedule:
    - cron: "15 10 * * 1-5"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install yfinance pandas pytz

      - name: Run Scanner
        run: python premarket_scanner.py

      - name: Save Watchlist
        run: |
          git config user.name  "DAY-S-BOT"
          git config user.email "bot@days-bot.com"
          git add daily_watchlist.csv 2>/dev/null || true
          git diff --cached --quiet || git commit -m "📋 Watchlist $(date -u '+%Y-%m-%d')"
          git push || true
